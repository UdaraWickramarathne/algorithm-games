services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: "3001"
      CORS_ORIGIN: "http://localhost"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  sqlite_data:
